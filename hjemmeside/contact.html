<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="contact.css">
    <link rel="icon" href="leftovers/logo.png">
</head>

<body>

    <div class="logo">
        <img src="pix_n_clipz/logo_name.png" alt="my logo">
    </div>

    <main>
        <nav class="navigation_buttons">
            <div>
                <a href="index.html">Home</a>
            </div>
            <div>
                <a href="projects.html">Projects</a>
            </div>
            <div>
                <a href="contact.html">Contact</a>
            </div>
        </nav>

        <header class="divider">
            <h1>Contact me!</h1>
            <p>
                Well, go on then!
            </p>
        </header>

        <section class="contact">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="What's your name?...">

            <label for="email">E-mail:</label>
            <input type="text" id="email" name="email" placeholder="Got an email?...">

            <label for="subject">Your Message:</label>
            <textarea id="subject" name="subject" placeholder="Write something great!..." style="height:200px"></textarea>

            <input type="submit" value="Submit">
        </section>

    </main>

    <footer class="footer">
        <img src="pix_n_clipz/footer_trees.png" alt="trees :D">
